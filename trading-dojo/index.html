<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="description" content="Trading Dojo — 看圖預測 Long/Short 的價格行為練習場，離線可用、可安裝到手機。">
<title>Trading Dojo · 價格行為練習場</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
  :root {
    --bg: #0b0e14;
    --panel: #141a26;
    --panel-2: #1b2333;
    --line: #2a3346;
    --text: #e6ecf5;
    --muted: #8a97ad;
    --up: #21c08a;
    --down: #f0506e;
    --accent: #4c8dff;
    --gold: #f5b942;
    --radius: 16px;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: radial-gradient(1200px 700px at 50% -200px, #16203a 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue",
                 "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    min-height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right)
             env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 16px 14px 40px; }

  header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
  .brand { display: flex; align-items: center; gap: 10px; }
  .logo { width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
          background: linear-gradient(135deg, var(--accent), #7b5cff); font-size: 18px; box-shadow: var(--shadow); }
  .brand h1 { font-size: 18px; margin: 0; letter-spacing: .3px; }
  .brand small { display: block; color: var(--muted); font-size: 11px; font-weight: 400; }
  #installBtn {
    display: none; border: 1px solid var(--line); background: var(--panel-2); color: var(--text);
    padding: 8px 12px; border-radius: 10px; font-size: 13px; cursor: pointer;
  }
  #installBtn:active { transform: scale(.97); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 10px 8px; text-align: center; }
  .stat .v { font-size: 17px; font-weight: 700; line-height: 1.1; }
  .stat .l { font-size: 10.5px; color: var(--muted); margin-top: 3px; letter-spacing: .3px; }
  .stat .v.up { color: var(--up); } .stat .v.down { color: var(--down); }

  .card { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
  .chart-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px 4px; }
  .chart-head .pair { font-weight: 700; font-size: 15px; letter-spacing: .5px; }
  .chart-head .meta { color: var(--muted); font-size: 12px; }
  canvas { display: block; width: 100%; height: 320px; touch-action: none; }

  .result { padding: 12px 14px; border-top: 1px solid var(--line); min-height: 22px; font-size: 14px; display: none; }
  .result.show { display: block; }
  .result b.up { color: var(--up); } .result b.down { color: var(--down); }

  .controls { margin-top: 14px; display: grid; gap: 10px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  button.act {
    border: none; border-radius: 14px; padding: 16px; font-size: 17px; font-weight: 700; color: #07121d;
    cursor: pointer; transition: transform .06s ease, filter .15s ease;
  }
  button.act:active { transform: translateY(1px) scale(.99); }
  button.act:disabled { opacity: .35; cursor: not-allowed; }
  .long { background: linear-gradient(135deg, #2ad79a, #15a978); }
  .short { background: linear-gradient(135deg, #ff6f86, #e23a5b); color: #fff; }
  .next { background: linear-gradient(135deg, var(--gold), #e09b1f); }
  .ghost { background: var(--panel-2); color: var(--text); border: 1px solid var(--line); font-weight: 600; }

  .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .seg { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .seg button { background: transparent; border: none; color: var(--muted); padding: 7px 12px; font-size: 12.5px; cursor: pointer; }
  .seg button.on { background: var(--accent); color: #fff; }
  .toolbar .reset { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 7px 12px; border-radius: 10px; font-size: 12.5px; cursor: pointer; }

  footer { text-align: center; color: var(--muted); font-size: 11.5px; margin-top: 22px; line-height: 1.6; }
  footer a { color: var(--muted); }
  .hint { color: var(--muted); font-size: 12.5px; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">📈</div>
      <div>
        <h1>Trading Dojo</h1>
        <small>價格行為 · Long/Short 預測練習</small>
      </div>
    </div>
    <button id="installBtn">安裝</button>
  </header>

  <section class="stats">
    <div class="stat"><div class="v" id="sBalance">$10,000</div><div class="l">資金</div></div>
    <div class="stat"><div class="v" id="sWin">—</div><div class="l">勝率</div></div>
    <div class="stat"><div class="v" id="sStreak">0</div><div class="l">連勝</div></div>
    <div class="stat"><div class="v" id="sTrades">0</div><div class="l">交易數</div></div>
  </section>

  <div class="card">
    <div class="chart-head">
      <span class="pair" id="pair">DOJO/USDT</span>
      <span class="meta" id="tf">1H · 練習盤</span>
    </div>
    <canvas id="chart"></canvas>
    <div class="result" id="result"></div>
  </div>

  <div class="controls">
    <div class="row">
      <button class="act long" id="longBtn">▲ 做多 Long</button>
      <button class="act short" id="shortBtn">▼ 做空 Short</button>
    </div>
    <button class="act next" id="nextBtn" style="display:none">下一手 →</button>
    <div class="hint" id="hint">看最後一根 K 線，預測接下來幾根會漲還是跌。</div>
  </div>

  <div class="toolbar">
    <div class="seg" id="diff">
      <button data-d="easy">輕鬆</button>
      <button data-d="normal" class="on">標準</button>
      <button data-d="hard">困難</button>
    </div>
    <button class="reset" id="resetBtn">重置紀錄</button>
  </div>

  <footer>
    純練習用途 · 隨機生成的模擬行情，與真實市場無關，不構成投資建議。<br>
    資料只存在你的裝置（localStorage）· 離線可用 · 可加入主畫面。
  </footer>
</div>

<script>
(() => {
  'use strict';

  // ---------- persistence ----------
  const KEY = 'trading-dojo-v1';
  const defaultState = { balance: 10000, trades: 0, wins: 0, streak: 0, best: 0, diff: 'normal' };
  let state = load();
  function load() {
    try { return Object.assign({}, defaultState, JSON.parse(localStorage.getItem(KEY) || '{}')); }
    catch { return Object.assign({}, defaultState); }
  }
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {} }

  // ---------- difficulty ----------
  const DIFF = {
    easy:   { vol: 0.010, drift: 0.0006, horizon: 6, lookback: 36, size: 0.20 },
    normal: { vol: 0.016, drift: 0.0000, horizon: 5, lookback: 42, size: 0.20 },
    hard:   { vol: 0.024, drift: 0.0000, horizon: 4, lookback: 50, size: 0.25 },
  };

  // ---------- synthetic market ----------
  // Geometric random walk producing OHLC candles. Self-contained, no network.
  function genCandles(n, vol, drift) {
    const candles = [];
    let price = 100 + Math.random() * 900;
    // gentle regime so charts feel "trendy" rather than pure noise
    let regime = (Math.random() - 0.5) * vol * 1.2;
    for (let i = 0; i < n; i++) {
      if (Math.random() < 0.06) regime = (Math.random() - 0.5) * vol * 1.4;
      const open = price;
      let p = open;
      const steps = 4;
      let hi = open, lo = open;
      for (let s = 0; s < steps; s++) {
        const shock = gauss() * vol / Math.sqrt(steps);
        p = p * (1 + drift + regime / steps + shock);
        if (p > hi) hi = p; if (p < lo) lo = p;
      }
      const close = p;
      candles.push({ o: open, h: Math.max(hi, open, close), l: Math.min(lo, open, close), c: close });
      price = close;
    }
    return candles;
  }
  function gauss() { // Box–Muller
    let u = 0, v = 0;
    while (u === 0) u = Math.random();
    while (v === 0) v = Math.random();
    return Math.sqrt(-2 * Math.log(u)) * Math.cos(2 * Math.PI * v);
  }

  // ---------- rendering ----------
  const canvas = document.getElementById('chart');
  const ctx = canvas.getContext('2d');
  let dpr = Math.max(1, window.devicePixelRatio || 1);

  let hand = null; // { all, lookback, horizon, revealCount, entryPrice, decided, direction }

  function resize() {
    dpr = Math.max(1, window.devicePixelRatio || 1);
    const w = canvas.clientWidth, h = canvas.clientHeight;
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    draw();
  }

  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (!hand) return;

    const pad = { l: 8 * dpr, r: 56 * dpr, t: 14 * dpr, b: 14 * dpr };
    const visible = hand.lookback + hand.revealCount;
    const candles = hand.all.slice(0, visible);
    const total = hand.lookback + hand.horizon; // x-axis fixed to full width so reveal grows in place

    let min = Infinity, max = -Infinity;
    for (const c of candles) { if (c.l < min) min = c.l; if (c.h > max) max = c.h; }
    const rng = (max - min) || 1;
    min -= rng * 0.08; max += rng * 0.08;

    const plotW = W - pad.l - pad.r;
    const plotH = H - pad.t - pad.b;
    const slot = plotW / total;
    const bodyW = Math.max(2 * dpr, slot * 0.62);
    const x = i => pad.l + slot * (i + 0.5);
    const y = p => pad.t + plotH * (1 - (p - min) / (max - min));

    // grid + price axis
    ctx.font = `${10.5 * dpr}px -apple-system, sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.fillStyle = '#8a97ad';
    ctx.lineWidth = 1 * dpr;
    for (let g = 0; g <= 4; g++) {
      const gy = pad.t + (plotH * g) / 4;
      ctx.beginPath(); ctx.moveTo(pad.l, gy); ctx.lineTo(W - pad.r, gy); ctx.stroke();
      const pv = max - (rng + rng * 0.16) * (g / 4);
      ctx.fillText(fmt(min + (max - min) * (1 - g / 4)), W - pad.r + 6 * dpr, gy);
    }

    // entry marker (vertical line at last lookback candle)
    const entryX = x(hand.lookback - 1);
    ctx.strokeStyle = 'rgba(76,141,255,0.45)';
    ctx.setLineDash([4 * dpr, 4 * dpr]);
    ctx.beginPath(); ctx.moveTo(entryX, pad.t); ctx.lineTo(entryX, H - pad.b); ctx.stroke();
    ctx.setLineDash([]);

    // candles
    for (let i = 0; i < candles.length; i++) {
      const c = candles[i];
      const isReveal = i >= hand.lookback;
      const upC = c.c >= c.o;
      let col = upC ? getCss('--up') : getCss('--down');
      if (isReveal) ctx.globalAlpha = 1; else ctx.globalAlpha = 0.95;
      const cx = x(i);
      // wick
      ctx.strokeStyle = col; ctx.lineWidth = Math.max(1, dpr);
      ctx.beginPath(); ctx.moveTo(cx, y(c.h)); ctx.lineTo(cx, y(c.l)); ctx.stroke();
      // body
      const yo = y(c.o), yc = y(c.c);
      const top = Math.min(yo, yc), hgt = Math.max(1.5 * dpr, Math.abs(yc - yo));
      ctx.fillStyle = col;
      ctx.fillRect(cx - bodyW / 2, top, bodyW, hgt);
      ctx.globalAlpha = 1;
    }

    // entry price dotted line
    ctx.strokeStyle = 'rgba(245,185,66,0.5)';
    ctx.setLineDash([2 * dpr, 3 * dpr]);
    const ey = y(hand.entryPrice);
    ctx.beginPath(); ctx.moveTo(pad.l, ey); ctx.lineTo(W - pad.r, ey); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = getCss('--gold');
    ctx.fillText(fmt(hand.entryPrice), W - pad.r + 6 * dpr, ey);
  }

  function getCss(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
  function fmt(n) {
    if (n >= 1000) return n.toFixed(0);
    if (n >= 100) return n.toFixed(1);
    return n.toFixed(2);
  }

  // ---------- game flow ----------
  const $ = id => document.getElementById(id);
  const longBtn = $('longBtn'), shortBtn = $('shortBtn'), nextBtn = $('nextBtn'),
        resultEl = $('result'), hintEl = $('hint');

  function newHand() {
    const d = DIFF[state.diff];
    const all = genCandles(d.lookback + d.horizon, d.vol, d.drift);
    hand = {
      all, lookback: d.lookback, horizon: d.horizon, revealCount: 0,
      entryPrice: all[d.lookback - 1].c, decided: false, direction: 0,
    };
    resultEl.classList.remove('show'); resultEl.innerHTML = '';
    longBtn.disabled = false; shortBtn.disabled = false;
    longBtn.style.display = shortBtn.parentElement.style.display = '';
    longBtn.parentElement.style.display = 'grid';
    nextBtn.style.display = 'none';
    hintEl.textContent = '看最後一根 K 線，預測接下來幾根會漲還是跌。';
    draw();
  }

  function decide(direction) {
    if (!hand || hand.decided) return;
    hand.decided = true; hand.direction = direction;
    longBtn.disabled = true; shortBtn.disabled = true;

    const d = DIFF[state.diff];
    const exit = hand.all[hand.lookback + hand.horizon - 1].c;
    const pct = (exit - hand.entryPrice) / hand.entryPrice;       // raw market move
    const pnlPct = pct * direction;                               // signed by our call
    const win = pnlPct >= 0;
    const pnl = state.balance * d.size * pnlPct;

    // animate reveal candle-by-candle, then settle
    let step = 0;
    const timer = setInterval(() => {
      step++; hand.revealCount = step; draw();
      if (step >= hand.horizon) {
        clearInterval(timer);
        settle(win, pnl, pnlPct, direction);
      }
    }, 140);
  }

  function settle(win, pnl, pnlPct, direction) {
    state.balance = Math.max(0, state.balance + pnl);
    state.trades += 1;
    if (win) { state.wins += 1; state.streak += 1; state.best = Math.max(state.best, state.streak); }
    else { state.streak = 0; }
    save(); renderStats();

    const dirTxt = direction > 0
      ? '<b class="up">做多 Long</b>' : '<b class="down">做空 Short</b>';
    const moveTxt = (pnlPct >= 0 ? '+' : '') + (pnlPct * 100).toFixed(2) + '%';
    const pnlTxt = (pnl >= 0 ? '+$' : '-$') + Math.abs(pnl).toLocaleString(undefined, { maximumFractionDigits: 0 });
    resultEl.innerHTML =
      `${win ? '✅ <b class="up">命中</b>' : '❌ <b class="down">看錯方向</b>'} · 你 ${dirTxt} · ` +
      `行情 <b class="${pnlPct >= 0 ? 'up' : 'down'}">${moveTxt}</b> · 損益 ` +
      `<b class="${pnl >= 0 ? 'up' : 'down'}">${pnlTxt}</b>`;
    resultEl.classList.add('show');

    longBtn.parentElement.style.display = 'none';
    nextBtn.style.display = 'block';
    hintEl.textContent = state.balance <= 0
      ? '資金歸零了 — 按「重置紀錄」重新開始。' : '準備好就發下一手。';

    if (state.balance <= 0) { nextBtn.disabled = true; nextBtn.textContent = '已爆倉 — 請重置'; }
    else { nextBtn.disabled = false; nextBtn.textContent = '下一手 →'; }
  }

  function renderStats() {
    $('sBalance').textContent = '$' + Math.round(state.balance).toLocaleString();
    $('sBalance').className = 'v ' + (state.balance >= 10000 ? 'up' : 'down');
    const wr = state.trades ? Math.round((state.wins / state.trades) * 100) : null;
    $('sWin').textContent = wr === null ? '—' : wr + '%';
    $('sStreak').textContent = state.streak + (state.best ? ' / ' + state.best : '');
    $('sTrades').textContent = state.trades;
  }

  // ---------- events ----------
  longBtn.addEventListener('click', () => decide(1));
  shortBtn.addEventListener('click', () => decide(-1));
  nextBtn.addEventListener('click', newHand);

  document.querySelectorAll('#diff button').forEach(b => {
    if (b.dataset.d === state.diff) {
      document.querySelectorAll('#diff button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
    }
    b.addEventListener('click', () => {
      document.querySelectorAll('#diff button').forEach(x => x.classList.remove('on'));
      b.classList.add('on');
      state.diff = b.dataset.d; save(); newHand();
    });
  });

  $('resetBtn').addEventListener('click', () => {
    if (!confirm('重置資金與所有統計紀錄？')) return;
    const diff = state.diff;
    state = Object.assign({}, defaultState, { diff });
    save(); renderStats(); newHand();
  });

  window.addEventListener('resize', resize);

  // PWA install
  let deferredPrompt = null;
  const installBtn = $('installBtn');
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'inline-block';
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice;
    deferredPrompt = null; installBtn.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

  // service worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }

  // ---------- boot ----------
  renderStats();
  resize();
  newHand();
})();
</script>
</body>
</html>
