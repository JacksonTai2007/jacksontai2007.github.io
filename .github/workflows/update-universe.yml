name: Update penny-stock universe

# Refreshes trading-dojo/data with REAL $0.50–$5 US stock OHLCV using the FMP API.
# Runs in CI (open network) and commits only when the data actually changed.
# Add repo secret FMP_API_KEY (free key from https://financialmodelingprep.com) to enable.

on:
  schedule:
    - cron: '17 22 * * 1-5'   # ~weekdays after US close (UTC); off-minute to avoid the rush
  workflow_dispatch: {}

concurrency:
  group: update-universe
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Refresh universe
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: node trading-dojo/tools/update-universe.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading-dojo/data
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh penny universe [skip ci]"
            git push
          fi
